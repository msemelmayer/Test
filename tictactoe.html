<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      transition: background 0.15s;
    }

    button:hover { background: #c73652; }

    #mode-toggle {
      background: #0f3460;
    }
    #mode-toggle:hover { background: #1a4a8a; }

    #score {
      display: flex;
      gap: 32px;
      font-size: 1rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.6rem; font-weight: bold; }
    .score-item .label { font-size: 0.75rem; color: #888; margin-top: 2px; }
    #score-x span { color: #e94560; }
    #score-o span { color: #a8dadc; }
    #score-draw span { color: #888; }
  </style>
</head>
<body>

  <h1>TIC TAC TOE</h1>

  <div id="score">
    <div class="score-item" id="score-x">
      <span id="sx">0</span>
      <div class="label">X WINS</div>
    </div>
    <div class="score-item" id="score-draw">
      <span id="sd">0</span>
      <div class="label">DRAWS</div>
    </div>
    <div class="score-item" id="score-o">
      <span id="so">0</span>
      <div class="label">O WINS</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="mode-toggle">vs CPU</button>
    <button id="restart">Restart</button>
    <button id="reset-score">Reset Score</button>
  </div>

<script>
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const modeBtn = document.getElementById('mode-toggle');

  let board = Array(9).fill('');
  let current = 'X';
  let gameOver = false;
  let vsAI = false;
  let scores = { X: 0, O: 0, D: 0 };

  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function checkWinner(b) {
    for (const [a, c, d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
    }
    if (b.every(v => v)) return { winner: 'D' };
    return null;
  }

  function render() {
    cells.forEach((cell, i) => {
      cell.textContent = board[i];
      cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
    });
  }

  function endGame(result) {
    gameOver = true;
    if (result.winner === 'D') {
      status.textContent = "It's a draw!";
      scores.D++;
      document.getElementById('sd').textContent = scores.D;
    } else {
      status.textContent = `${result.winner} wins!`;
      result.line.forEach(i => cells[i].classList.add('win'));
      scores[result.winner]++;
      document.getElementById(result.winner === 'X' ? 'sx' : 'so').textContent = scores[result.winner];
    }
  }

  function minimax(b, isMax) {
    const r = checkWinner(b);
    if (r) return r.winner === 'O' ? 10 : r.winner === 'X' ? -10 : 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, false)); b[i] = ''; }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, true)); b[i] = ''; }
      }
      return best;
    }
  }

  function aiMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, false);
        board[i] = '';
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  function play(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    render();
    const result = checkWinner(board);
    if (result) { endGame(result); return; }
    current = current === 'X' ? 'O' : 'X';
    status.textContent = `${current}'s turn`;

    if (vsAI && current === 'O' && !gameOver) {
      setTimeout(() => {
        const move = aiMove();
        if (move !== -1) {
          board[move] = 'O';
          render();
          const r2 = checkWinner(board);
          if (r2) { endGame(r2); return; }
          current = 'X';
          status.textContent = "X's turn";
        }
      }, 200);
    }
  }

  function restart() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    status.textContent = "X's turn";
    render();
  }

  cells.forEach(cell => cell.addEventListener('click', () => play(+cell.dataset.i)));

  document.getElementById('restart').addEventListener('click', restart);

  document.getElementById('reset-score').addEventListener('click', () => {
    scores = { X: 0, O: 0, D: 0 };
    document.getElementById('sx').textContent = 0;
    document.getElementById('so').textContent = 0;
    document.getElementById('sd').textContent = 0;
    restart();
  });

  modeBtn.addEventListener('click', () => {
    vsAI = !vsAI;
    modeBtn.textContent = vsAI ? 'vs Human' : 'vs CPU';
    restart();
  });
</script>
</body>
</html>
